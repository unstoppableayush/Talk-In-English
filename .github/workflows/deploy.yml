name: Build and deploy a container to an Azure Web App (Redeploy)

env:
  AZURE_WEBAPP_NAME: talkinenglish  # set this to the name of your Azure Web App
  PYTHON_VERSION: '3.14'

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
  
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
  
      - name: Zip backend only
        run: |
          cd backend
          zip -r ../release.zip .
  
      - name: Deploy to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip
