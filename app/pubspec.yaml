name: speaking_app
description: A beautiful and smooth speaking app built with Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Routing
  go_router: ^14.2.0

  # Networking
  dio: ^5.5.0
  web_socket_channel: ^3.0.1

  # UI & Animations
  lottie: ^3.1.2
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    # - assets/images/
    # - assets/animations/
